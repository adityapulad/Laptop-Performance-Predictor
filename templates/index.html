<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Performance Predictor</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Hardware <span>Predictor</span></h1>
            <p>Will your laptop run it? Select your setup and a game to find out in milliseconds.</p>
            <nav style="margin-top: 1rem;">
                <a href="/" class="nav-link active">Laptop Database</a>
                <a href="/dream" class="nav-link">Dream Specs Builder</a>
            </nav>
        </header>

        <main class="glass-card">
            <div class="input-group">
                <label for="laptop-input">Your Machine</label>
                <div class="select-wrapper">
                    <input type="text" id="laptop-input" list="laptop-list" placeholder="Search for your laptop..." class="search-input">
                    <datalist id="laptop-list"></datalist>
                </div>
            </div>

            <div class="input-group">
                <label for="game-input">Target Game</label>
                <div class="select-wrapper">
                    <input type="text" id="game-input" list="game-list" placeholder="Search for a game..." class="search-input">
                    <datalist id="game-list"></datalist>
                </div>
            </div>

            <button id="predict-btn" class="glow-btn">
                <span>Analyze Performance</span>
            </button>

            <!-- Loading Spinner -->
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Calculating bottlenecks via SHAP...</p>
            </div>

            <!-- Result Section -->
            <div id="result-section" class="hidden">
                <div class="result-badge" id="result-badge">
                    <h2 id="prediction-text">Optimal</h2>
                </div>
                
                <div id="bottleneck-section" class="bottlenecks hidden">
                    <h3>Performance Bottlenecks Detected</h3>
                    <ul id="bottleneck-list">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
